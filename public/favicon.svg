<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#020917"/>
  <!-- Brackets -->
  <text x="3" y="23" font-family="monospace" font-size="20" font-weight="700" fill="#39ff14">[</text>
  <text x="24" y="23" font-family="monospace" font-size="20" font-weight="700" fill="#39ff14">]</text>
  <!-- S letterform in center -->
  <text x="10.5" y="23" font-family="monospace" font-size="16" font-weight="700" fill="#ffffff">s</text>
</svg>
